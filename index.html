<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#06200f" />
<title>Brazil Live — Colour & Gossip</title>
<style>
  :root{--bg:#06200f;--card:#0c2e16;--card2:#103a1d;--line:#1c4a2a;--txt:#eafff0;--dim:#9fd4ad;--accent:#ffd24a;--br:#2ec26a}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:680px;margin:0 auto;padding:0 14px 80px}
  header{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,var(--bg) 72%,rgba(6,32,15,0));padding:16px 14px 12px;margin:0 -14px}
  .score{display:flex;align-items:center;justify-content:center;gap:14px}
  .team{font-weight:800;font-size:18px}.team.br{color:#ffe680}.team.opp{color:#ff8a8a}
  .sc{font-size:30px;font-weight:900;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:4px 14px;min-width:84px;text-align:center;letter-spacing:2px}
  .meta{text-align:center;color:var(--dim);font-size:12.5px;margin-top:8px;line-height:1.5}
  .pill{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px 10px;font-size:11.5px;font-weight:600;color:var(--dim)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--br);animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(46,194,106,.55)}70%{box-shadow:0 0 0 8px rgba(46,194,106,0)}100%{box-shadow:0 0 0 0 rgba(46,194,106,0)}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 15px;margin:11px 0;animation:rise .45s ease both}
  .card.new{border-color:rgba(255,210,74,.55);box-shadow:0 0 0 1px rgba(255,210,74,.18)}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .top{display:flex;align-items:center;gap:9px;margin-bottom:7px}
  .emoji{font-size:22px}.ttl{font-weight:750;font-size:15.5px;line-height:1.3;flex:1}
  .body{color:#d7f3e0;font-size:14px;line-height:1.52}
  .tags{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap;align-items:center}
  .tag{font-size:10.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;border-radius:6px;padding:2px 7px;color:var(--dim);background:var(--card2);border:1px solid var(--line)}
  .tag.min{color:#06200f;background:var(--accent);border-color:var(--accent)}
  .tag.cat-fofoca{color:#ff9ecb}.tag.cat-funny{color:#ffd24a}.tag.cat-fan{color:#7df0a0}.tag.cat-commentary{color:#7db8ff}.tag.cat-vibe{color:#9affd0}.tag.cat-goal{color:#06200f;background:var(--br);border-color:var(--br)}.tag.cat-bias{color:#ffe680}
  .src{margin-left:auto;color:#5e8a6e;font-size:11px}
  .foot{text-align:center;color:#5e8a6e;font-size:11.5px;margin-top:22px;line-height:1.6}
  .stale{color:#ff8a8a}.empty{text-align:center;color:var(--dim);padding:40px 0}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="score"><span class="team br" id="teamH">Brazil</span><span class="sc" id="sc">–</span><span class="team opp" id="teamA">Morocco</span></div>
    <div class="meta"><span class="pill"><span class="dot"></span><span id="status">LIVE</span></span> <span id="minute"></span><br/><span id="comp"></span><br/><span id="ago">updating…</span></div>
  </header>
  <div id="feed"><div class="empty">Loading the gossip…</div></div>
  <div class="foot">Curated by Claude — only the fun stuff. 💛💚 Vai, Brazil!<br/>PT · EN · AR sources · refreshes every 30s</div>
</div>
<script>
const FEED_URL="https://raw.githubusercontent.com/kormakurart-hub/Kor-public/main/feed.json";
let seen=new Set(),first=true;
function ago(iso){const s=Math.max(0,(Date.now()-new Date(iso).getTime())/1000);if(s<60)return Math.floor(s)+"s ago";if(s<3600)return Math.floor(s/60)+"min ago";return Math.floor(s/3600)+"h ago";}
function esc(t){const d=document.createElement('div');d.textContent=t||'';return d.innerHTML;}
async function load(){try{
 const r=await fetch(FEED_URL+"?t="+Date.now(),{cache:"no-store"});if(!r.ok)throw 0;const d=await r.json();
 document.getElementById('teamH').textContent=d.score?.home||"Brazil";
 document.getElementById('teamA').textContent=d.score?.away||"Morocco";
 const h=d.score?.h,a=d.score?.a;document.getElementById('sc').textContent=(h==null||a==null)?"–":(h+" : "+a);
 document.getElementById('status').textContent=d.status||"LIVE";
 document.getElementById('minute').textContent=(d.minute&&d.minute!=="—")?d.minute+"'":"";
 document.getElementById('comp').textContent=d.competition||"";
 if(d.updated){const m=(Date.now()-new Date(d.updated).getTime())/60000;const e=document.getElementById('ago');e.textContent="feed "+ago(d.updated);e.className=m>20?"stale":"";}
 const items=(d.items||[]).slice().sort((x,y)=>new Date(y.ts)-new Date(x.ts));const feed=document.getElementById('feed');
 if(!items.length){feed.innerHTML='<div class="empty">No gossip yet — coming soon.</div>';return;}
 feed.innerHTML=items.map(it=>{const isNew=!first&&!seen.has(it.id);const cat=it.cat||'vibe';return `<div class="card ${isNew?'new':''}"><div class="top"><span class="emoji">${esc(it.emoji||'⚽')}</span><span class="ttl">${esc(it.title)}</span></div><div class="body">${esc(it.text)}</div><div class="tags"><span class="tag min">${esc(it.min||'')}</span><span class="tag cat-${esc(cat)}">${esc(cat)}</span><span class="tag">${esc(it.lang||'')}</span><span class="src">${esc(it.src||'')} · ${ago(it.ts)}</span></div></div>`;}).join('');
 items.forEach(it=>seen.add(it.id));first=false;
}catch(e){const el=document.getElementById('ago');el.textContent="reconnecting…";el.className="stale";}}
load();setInterval(load,30000);
</script>
</body>
</html>
